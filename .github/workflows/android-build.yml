name: Build Android APK

permissions:
  contents: write   # REQUIRED for creating releases

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'

  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'

  workflow_dispatch:
    inputs:
      build_type:
        description: 'APK build type'
        required: true
        default: 'debug'
        type: choice
        options: ['debug', 'release', 'both']

      create_release:
        description: 'Create a GitHub release?'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']

      custom_version:
        description: 'Custom version tag (leave empty to auto-detect)'
        required: false
        default: ''
        type: string

      prerelease:
        description: 'Mark as pre-release?'
        required: true
        default: 'no'
        type: choice
        options: ['yes', 'no']

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Determine Build Type
      # -------------------------
      - name: Determine Build Type
        id: build_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=debug" >> $GITHUB_OUTPUT
          fi

      # -------------------------
      # Get Version
      # -------------------------
      - name: Get Version
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" ./app/app/build.gradle | sed 's/.*versionName "//' | sed 's/".*//')
          VERSION_CODE=$(grep "versionCode" ./app/app/build.gradle | sed 's/.*versionCode //')

          CUSTOM_VERSION="${{ github.event.inputs.custom_version }}"
          if [ -n "$CUSTOM_VERSION" ]; then
            VERSION_NAME="$CUSTOM_VERSION"
          fi

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      # -------------------------
      # Setup Java
      # -------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # -------------------------
      # Setup Gradle
      # -------------------------
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # -------------------------
      # Make Gradle Executable
      # -------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x app/gradlew

      # -------------------------
      # Build APK(s)
      # -------------------------
      - name: Build APK(s)
        working-directory: ./app
        run: |
          BUILD_TYPE="${{ steps.build_type.outputs.type }}"

          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --stacktrace
          elif [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --stacktrace
          else
            ./gradlew assembleDebug assembleRelease --stacktrace
          fi

      # -------------------------
      # Prepare Debug APK
      # -------------------------
      - name: Prepare Debug APK
        id: debug_apk
        if: steps.build_type.outputs.type == 'debug' || steps.build_type.outputs.type == 'both'
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          DEBUG_APK=$(find ./app/app/build/outputs/apk/debug -name "*.apk" | head -1 || true)

          if [ -n "$DEBUG_APK" ]; then
            DEBUG_NAME="DogeRat-v${VERSION}-debug.apk"
            cp "$DEBUG_APK" "$DEBUG_NAME"
            echo "debug_apk_name=$DEBUG_NAME" >> $GITHUB_OUTPUT
          fi

      # -------------------------
      # Prepare Release APK
      # -------------------------
      - name: Prepare Release APK
        id: release_apk
        if: steps.build_type.outputs.type == 'release' || steps.build_type.outputs.type == 'both'
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          RELEASE_APK=$(find ./app/app/build/outputs/apk/release -name "*.apk" | head -1 || true)

          if [ -n "$RELEASE_APK" ]; then
            RELEASE_NAME="DogeRat-v${VERSION}-release.apk"
            cp "$RELEASE_APK" "$RELEASE_NAME"
            echo "release_apk_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          fi

      # -------------------------
      # Upload Artifacts
      # -------------------------
      - name: Upload Debug APK
        if: steps.debug_apk.outputs.debug_apk_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.debug_apk.outputs.debug_apk_name }}
          path: ./${{ steps.debug_apk.outputs.debug_apk_name }}
          retention-days: 30

      - name: Upload Release APK
        if: steps.release_apk.outputs.release_apk_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_apk.outputs.release_apk_name }}
          path: ./${{ steps.release_apk.outputs.release_apk_name }}
          retention-days: 30

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'yes'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: DogeRat v${{ steps.version.outputs.version_name }}
          files: |
            ${{ steps.debug_apk.outputs.debug_apk_name }}
            ${{ steps.release_apk.outputs.release_apk_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'yes' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
